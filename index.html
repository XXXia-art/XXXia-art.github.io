<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzhi Xia</title>
  <meta
    name="description"
    content="Puzhi Xia's academic homepage featuring research, news, projects, experience, and interests."
  >
  <link rel="stylesheet" href="styles/main.css?v=20260428">
</head>
<body>
  <div class="container" id="app">
    <div class="page-shell">
      <aside class="sidebar" id="poem-sidebar"></aside>
      <div class="content-column">
        <header class="header panel" id="site-header"></header>
        <main id="site-main"></main>
        <footer class="footer" id="site-footer"></footer>
      </div>
    </div>
  </div>

  <script>
    window.__resumeBooted = false;

    window.addEventListener("error", (event) => {
      const header = document.getElementById("site-header");
      const main = document.getElementById("site-main");
      if (!header || !main) {
        return;
      }

      const message = event?.message || "Unknown script error";
      header.innerHTML = `
        <div style="width:100%">
          <h1 class="name">Module Load Error</h1>
          <p class="subtitle">The page shell loaded, but a script failed before rendering began.</p>
          <p class="research" style="color:#991b1b">${message}</p>
        </div>
      `;
      main.innerHTML = `
        <section class="section">
          <h2 class="section-title">Debug Hint</h2>
          <p>Please open the browser console and copy the first red error line.</p>
        </section>
      `;
    });

    window.addEventListener("unhandledrejection", (event) => {
      const header = document.getElementById("site-header");
      const main = document.getElementById("site-main");
      const reason = event?.reason instanceof Error
        ? `${event.reason.name}: ${event.reason.message}`
        : String(event?.reason ?? "Unknown promise rejection");

      if (!header || !main) {
        return;
      }

      header.innerHTML = `
        <div style="width:100%">
          <h1 class="name">Module Load Error</h1>
          <p class="subtitle">The page shell loaded, but a promise rejected before rendering began.</p>
          <p class="research" style="color:#991b1b">${reason}</p>
        </div>
      `;
      main.innerHTML = `
        <section class="section">
          <h2 class="section-title">Debug Hint</h2>
          <p>Please open the browser console and copy the first red error line.</p>
        </section>
      `;
    });

    window.setTimeout(() => {
      if (window.__resumeBooted) {
        return;
      }

      const header = document.getElementById("site-header");
      const main = document.getElementById("site-main");
      if (!header || !main) {
        return;
      }

      header.innerHTML = `
        <div style="width:100%">
          <h1 class="name">Boot Timeout</h1>
          <p class="subtitle">The module script did not finish booting within 2 seconds.</p>
          <p class="research" style="color:#991b1b">Please open the browser console and copy the first red error line.</p>
        </div>
      `;
      main.innerHTML = `
        <section class="section">
          <h2 class="section-title">Possible Causes</h2>
          <p>A child module failed to load, a browser extension blocked execution, or the module graph hit a runtime error before rendering.</p>
        </section>
      `;
    }, 2000);
  </script>
  <script type="module" src="scripts/main.js?v=20260428"></script>
</body>
</html>
